name = "dominion-observatory"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# EBTO x402 payment wallet — public address, safe as plaintext var (HARD RULE 7: deploy-safe)
PAYMENT_WALLET = "0xCF8C01f1EFc61fA0eCc7614Ed1fA8f668D9aA8A2"
# AGT_HMAC_SECRET must be set via: wrangler secret put AGT_HMAC_SECRET (CEO action required)

[[d1_databases]]
binding = "DB"
database_name = "dominion-observatory-db"
database_id = "2979515b-1cfc-42f2-9f40-be1b680a73aa"

[triggers]
crons = ["*/15 * * * *"]
